<!DOCTYPE html>
<html lang="en">

<head>
    <title>TRAPT</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Combining graph convolution and knowledge distillation to predict
    transcriptional cofactor and chromatin regulator activity.">
    <meta name="author" content="Guorui Zhang">
    <link href="static/css/all.css" rel="stylesheet">
    <!-- Nucleo Icons -->
    <link href="static/css/nucleo-icons.css" rel="stylesheet" />
    <link href="static/css/nucleo-svg.css" rel="stylesheet" />
    <!-- Font Awesome Icons -->
    <link href="static/css/font-awesome.css" rel="stylesheet" />
    <link href="static/css/dataTables.bootstrap4.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="static/assets/css/material-dashboard.min.css">
    <link rel="icon" sizes="16x16" href="favicon.ico">
    <script src="static/assets/js/core/popper.min.js" type="text/javascript"></script>
    <script src="static/assets/js/core/jquery.min.js" type="text/javascript"></script>
    <script src="static/assets/js/core/bootstrap-material-design.min.js" type="text/javascript"></script>
    <script src="static/assets/js/material-dashboard.min.js"></script>
    <script src="static/assets/js/plugins/bootstrap-notify.js"></script>
    <script src="static/assets/js/plugins/chartist.min.js"></script>
    <script src="static/assets/js/plugins/perfect-scrollbar.jquery.min.js"></script>
    <script src="static/js/echarts.min.js"></script>
    <script src="static/js/jquery.dataTables.min.js"></script>
    <script src="static/js/dataTables.bootstrap4.min.js"></script>
    <script src="static/js/dataTables.buttons.js"></script>
    <script src="static/js/buttons.flash.js"></script>
    <script src="static/js/buttons.html5.js"></script>
    <script src="static/js/buttons.print.js"></script>
    <style>
        .card-profile[data-image="profile-image"] {
            overflow: visible;
        }

        @font-face {
            font-family: 'Comic Sans MS';
            src: url('/static/fonts/Comic Sans MS.ttf');
        }


        .CF {
            font-family: 'Comic Sans MS';
        }

        .text-red {
            color: rgb(234, 20, 20);
        }

        .text-black {
            color: #000;
        }

        .navbar {
            margin-bottom: 0;
        }

        .sidebar .nav i {
            position: relative;
            top: -4px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="sidebar" data-color="purple" data-background-color="white" data-image="../assets/img/sidebar-1.jpg">
            <div class="logo"><a class="simple-text logo-normal CF" href="/TRAPT"><b class="text-success">TC</b>
                    <b class="text-info">APT</b></a></div>
            <div class="sidebar-wrapper ps-container ps-theme-default">
                <ul class="nav">
                    <li class="nav-item"><a class="nav-link pl-5" href="/TRAPT"><i class="fa fa-home"></i> Home</a>
                    </li>
                    <li class="nav-item"><a class="nav-link pl-5" href="/TRAPT/analysis"><i class="fa fa-tasks"></i>
                            Analysis</a></li>
                    <li class="nav-item"><a class="nav-link pl-5" href="/TRAPT/download"><i class="fa fa-download"></i>
                            Download</a></li>
                    <li class="nav-item"><a class="nav-link pl-5" href="http://www.licpathway.net/"><i
                                class="fa fa-phone"></i>
                            Contact</a>
                    </li>
                    <li class="nav-item"><a class="nav-link pl-5" href="/TRAPT/help"><i
                                class="fa fa-question-circle"></i>
                            Help</a>
                    </li>
                </ul>
                <div class="ps-scrollbar-x-rail" style="left: 0px; bottom: 0px;">
                    <div class="ps-scrollbar-x" tabindex="0" style="left: 0px; width: 0px;"></div>
                </div>
                <div class="ps-scrollbar-y-rail" style="top: 0px; right: 0px;">
                    <div class="ps-scrollbar-y" tabindex="0" style="top: 0px; height: 0px;"></div>
                </div>
            </div>
            <div class="sidebar-background" style="background-image: url(/static/assets/img/sidebar-1.jpg) "></div>
        </div>
        <div class="main-panel ps-container ps-theme-default">
            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>

</html>
